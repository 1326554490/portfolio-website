<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#160f30"/>
      <stop offset="100%" stop-color="#241640"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b38cff" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#b38cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neonTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74e8ff"/>
      <stop offset="50%" stop-color="#b38cff"/>
      <stop offset="100%" stop-color="#ff6ec7"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1640"/>
      <stop offset="100%" stop-color="#0d0922"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="panelShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="30" flood-color="#74e8ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 深紫背景 -->
  <rect width="1200" height="900" fill="url(#bg)"/>
  <!-- 中心柔光，把视线聚到头像 -->
  <ellipse cx="600" cy="370" rx="560" ry="440" fill="url(#centerGlow)"/>

  <!-- 像素网格背景（极淡） -->
  <g opacity="0.06" stroke="#74e8ff" stroke-width="1" fill="none">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200 M0 800 H1200"/>
    <path d="M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900"/>
  </g>

  <!-- 四角霓虹像素装饰 -->
  <g shape-rendering="crispEdges">
    <rect x="64" y="64" width="20" height="20" fill="#74e8ff"/>
    <rect x="88" y="64" width="20" height="20" fill="#74e8ff" opacity="0.5"/>
    <rect x="64" y="88" width="20" height="20" fill="#74e8ff" opacity="0.5"/>
    <rect x="1116" y="816" width="20" height="20" fill="#ff6ec7"/>
    <rect x="1092" y="816" width="20" height="20" fill="#ff6ec7" opacity="0.5"/>
    <rect x="1116" y="792" width="20" height="20" fill="#ff6ec7" opacity="0.5"/>
  </g>

  <!-- 中心头像面板（明显高于背景，霓虹描边 + 投影 + 渐变面板） -->
  <g transform="translate(468, 150)" filter="url(#panelShadow)">
    <rect width="264" height="320" rx="24" fill="url(#panelGrad)" stroke="#b38cff" stroke-width="2.5" stroke-opacity="0.85"/>
    <!-- 面板内顶部 mono 标 -->
    <text x="132" y="44" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#74e8ff" letter-spacing="3" font-weight="700">// PERSONA #0420</text>

    <!-- 像素小人 -->
    <g transform="translate(72, 66)" shape-rendering="crispEdges">
      <!-- 头发（紫） -->
      <rect x="20" y="0" width="80" height="30" fill="#c084fc"/>
      <rect x="14" y="14" width="6" height="20" fill="#c084fc"/>
      <rect x="100" y="14" width="6" height="20" fill="#c084fc"/>
      <!-- 脸 -->
      <rect x="26" y="26" width="68" height="58" fill="#f5e0c8"/>
      <!-- 眼睛（青蓝发光） -->
      <rect x="40" y="48" width="12" height="12" fill="#0a0e1a"/>
      <rect x="68" y="48" width="12" height="12" fill="#0a0e1a"/>
      <rect x="42" y="50" width="5" height="5" fill="#74e8ff"/>
      <rect x="70" y="50" width="5" height="5" fill="#74e8ff"/>
      <!-- 腮红 -->
      <rect x="32" y="68" width="10" height="6" fill="#ff6ec7" opacity="0.65"/>
      <rect x="78" y="68" width="10" height="6" fill="#ff6ec7" opacity="0.65"/>
      <!-- 嘴 -->
      <rect x="52" y="72" width="16" height="5" fill="#c4596b"/>
      <!-- 身体 -->
      <rect x="20" y="84" width="80" height="56" fill="#b38cff"/>
      <rect x="30" y="98" width="60" height="8" fill="#74e8ff"/>
      <rect x="48" y="114" width="24" height="8" fill="#ff6ec7"/>
    </g>

    <!-- MBTI 标签 -->
    <rect x="82" y="262" width="100" height="26" rx="4" fill="#74e8ff"/>
    <text x="132" y="280" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#0a0e1a" letter-spacing="3">INFP</text>
  </g>

  <!-- 文字区：居中对齐（与 Lodue 海报统一）-->
  <g text-anchor="middle">
    <!-- eyebrow -->
    <text x="600" y="540" font-family="'JetBrains Mono', monospace" font-size="17" fill="#74e8ff" letter-spacing="6" font-weight="700">PIXEL × MBTI × NFT</text>

    <!-- 主标题（霓虹渐变 + 辉光） -->
    <text x="600" y="636" font-family="'Inter Tight', Inter, sans-serif" font-size="92" font-weight="700" fill="url(#neonTitle)" letter-spacing="-1" filter="url(#softGlow)">Pixel Persona</text>

    <!-- 副标题 -->
    <text x="600" y="690" font-family="'Inter', 'PingFang SC', sans-serif" font-size="27" font-weight="400" fill="#c8b8e8" letter-spacing="2">像素人格 · 基于 MBTI 构建你的数字身份</text>

    <!-- 分隔短线 -->
    <line x1="566" y1="730" x2="634" y2="730" stroke="#b38cff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 底部 chip 区：居中三个霓虹胶囊 -->
  <g font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="2" font-weight="700">
    <g transform="translate(348, 778)">
      <rect width="156" height="48" rx="24" fill="#150f30" stroke="#74e8ff" stroke-width="1.5"/>
      <rect x="22" y="16" width="16" height="16" fill="#74e8ff"/>
      <text x="92" y="31" text-anchor="middle" fill="#74e8ff">8+3 维度</text>
    </g>
    <g transform="translate(522, 778)">
      <rect width="156" height="48" rx="24" fill="#150f30" stroke="#b38cff" stroke-width="1.5"/>
      <circle cx="32" cy="24" r="8" fill="#b38cff"/>
      <circle cx="32" cy="24" r="4" fill="#ff6ec7"/>
      <text x="96" y="31" text-anchor="middle" fill="#b38cff">10 色板</text>
    </g>
    <g transform="translate(696, 778)">
      <rect width="156" height="48" rx="24" fill="#150f30" stroke="#ff6ec7" stroke-width="1.5"/>
      <rect x="22" y="16" width="4" height="16" fill="#ff6ec7"/>
      <rect x="30" y="16" width="4" height="16" fill="#ff6ec7" opacity="0.6"/>
      <rect x="38" y="16" width="4" height="16" fill="#ff6ec7" opacity="0.3"/>
      <text x="92" y="31" text-anchor="middle" fill="#ff6ec7">AI 宣言</text>
    </g>
  </g>
</svg>
