<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef0f0"/>
      <stop offset="55%" stop-color="#dde2e3"/>
      <stop offset="100%" stop-color="#c4cccd"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bookCoverFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafcfc"/>
      <stop offset="100%" stop-color="#d8e0e1"/>
    </linearGradient>
    <linearGradient id="bookCoverSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d0d1"/>
      <stop offset="100%" stop-color="#aab2b3"/>
    </linearGradient>
    <filter id="bookShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="22"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 灰白渐变背景 -->
  <rect width="1200" height="900" fill="url(#bg)"/>
  <ellipse cx="600" cy="380" rx="720" ry="520" fill="url(#vignette)"/>

  <!-- 一本立体放置的书：右侧封面正面 + 左侧书脊厚度 -->
  <g filter="url(#bookShadow)">
    <polygon points="380,250 380,650 430,624 430,276" fill="url(#bookCoverSide)"/>
    <rect x="430" y="276" width="380" height="372" rx="3" fill="url(#bookCoverFront)" stroke="#aeb6b7" stroke-width="1.5"/>
    <line x1="810" y1="280" x2="810" y2="644" stroke="#cdd4d5" stroke-width="1"/>
    <line x1="813" y1="284" x2="813" y2="640" stroke="#bcc3c4" stroke-width="1"/>

    <g font-family="'Inter Tight', Inter, 'Source Han Serif SC', 'Songti SC', serif">
      <line x1="466" y1="320" x2="510" y2="320" stroke="#6f7479" stroke-width="2"/>
      <text x="522" y="326" font-size="14" fill="#6f7479" letter-spacing="3" font-family="'JetBrains Mono', monospace">PORTFOLIO · 2025</text>
      <text x="466" y="430" font-size="62" font-weight="500" fill="#2f3437" letter-spacing="-1">考 研</text>
      <text x="466" y="490" font-size="62" font-weight="500" fill="#2f3437" letter-spacing="-1">作 品 集</text>
      <text x="466" y="538" font-size="17" fill="#5f6669" letter-spacing="2">A Bound Volume · 印 装 合 订 本</text>
      <line x1="466" y1="600" x2="774" y2="600" stroke="#aeb6b7" stroke-width="1"/>
      <text x="466" y="624" font-size="13" fill="#6f7479" letter-spacing="2" font-family="'JetBrains Mono', monospace">LIU BIYI · 刘 碧 依</text>
    </g>

    <line x1="395" y1="290" x2="395" y2="620" stroke="#8a9293" stroke-width="1" opacity="0.6"/>
    <line x1="412" y1="284" x2="412" y2="624" stroke="#8a9293" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- 卡片底部：标题+副标，与其他海报统一 -->
  <g text-anchor="middle" font-family="'Inter Tight', Inter, 'Source Han Serif SC', 'Songti SC', serif">
    <text x="600" y="730" font-size="62" font-weight="500" fill="#3a3e41" letter-spacing="-1">考研作品集</text>
    <text x="600" y="772" font-size="22" font-weight="400" fill="#6b7174" letter-spacing="1.2">以书的形式装帧成册 · 13 个跨页</text>
    <line x1="572" y1="804" x2="628" y2="804" stroke="#8a9092" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#6b7174" letter-spacing="2.5" font-weight="500">
      <text x="600" y="844">FLIP · READ · ARCHIVE</text>
    </g>
  </g>
</svg>
