<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拙作 · 刘碧依</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: "Source Han Serif SC", "Noto Serif SC", serif;
    background: linear-gradient(165deg, #fafaf7 0%, #f0f0ec 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.85'/></svg>");
    opacity: 0.035;
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* 主容器 */
  .logo-container {
    position: relative;
    width: clamp(160px, 22vw, 300px);
    height: auto;
  }

  /* 你的原始设计图 */
  .logo-img {
    width: 100%;
    height: auto;
    display: block;
    opacity: 0;
    animation: imgFadeIn 1.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes imgFadeIn {
    to { opacity: 1; }
  }

  body:not(.clicked) .logo-container:hover .logo-img {
    transform: scale(1.025);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* 动画叠加层 */
  .anim-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* 山峰白色河流（在拙字右上角山的位置）*/
  .river-flow {
    position: absolute;
    right: 8%;
    top: 8%;
    width: 32%;
    height: 10%;
    opacity: 0;
  }
  .river-flow svg {
    width: 100%;
    height: 100%;
  }
  @keyframes riverMove {
    0% { opacity: 0; }
    18% { opacity: 0.75; }
    82% { opacity: 0.65; }
    100% { opacity: 0; }
  }

  /* 小人裙摆光晕（在作字左侧单立人位置）*/
  .person-glow {
    position: absolute;
    left: 16%;
    bottom: 18%;
    width: 18%;
    height: 24%;
    background: radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.4), transparent 65%);
    border-radius: 50%;
    opacity: 0;
    filter: blur(9px);
    animation: glowBreathe 3.8s ease-in-out infinite;
    mix-blend-mode: overlay;
  }
  @keyframes glowBreathe {
    0%, 100% { opacity: 0.32; transform: translateY(0) scaleY(1); }
    50% { opacity: 0.68; transform: translateY(-3px) scaleY(1.05); }
  }

  /* 整体呼吸 */
  body:not(.clicked) .logo-img {
    animation: imgFadeIn 1.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards,
               imgBreathe 5.2s 2.5s ease-in-out infinite;
  }
  @keyframes imgBreathe {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(0.94); }
  }

  /* 点击后：整体变形 */
  body.clicked .logo-container {
    animation: morphOut 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }
  @keyframes morphOut {
    0% { opacity: 1; transform: scale(1) rotate(0deg); }
    38% { opacity: 0.78; transform: scale(0.91) rotate(-3.5deg); }
    72% { opacity: 0.42; transform: scale(1.13) rotate(2.8deg); }
    100% { opacity: 0; transform: scale(1.32) rotate(0deg); }
  }

  /* "个人作品集" */
  .title {
    position: fixed;
    font-size: clamp(34px, 5.8vw, 76px);
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.2em;
    opacity: 0;
    transform: scale(0.82) translateY(30px);
  }
  body.clicked .title {
    animation: titleIn 1.45s 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes titleIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* 提示 */
  .hint {
    position: fixed;
    bottom: 72px;
    font-size: 13px;
    letter-spacing: 0.28em;
    color: rgba(26, 26, 26, 0.26);
    opacity: 0;
    animation: hintIn 1.2s 2.7s ease-out forwards;
    font-weight: 300;
  }
  @keyframes hintIn {
    to { opacity: 1; }
  }
  body.clicked .hint {
    animation: hintOut 0.5s 1.45s forwards;
  }
  @keyframes hintOut {
    to { opacity: 0; }
  }

  /* 整页淡出：交接前把整屏溶进背景色，与 main.html 的淡入无缝衔接 */
  body {
    transition: opacity 0.9s var(--ease, cubic-bezier(0.22, 1, 0.36, 1));
  }
  body.leaving { opacity: 0; }
  @media (prefers-reduced-motion: reduce) {
    body { transition: none; }
    .logo-img, .title, .hint { animation: none !important; opacity: 1 !important; }
  }

  </style>
</head>
<body>

<div class="logo-container">
  <!-- 你的原始设计图 -->
  <img class="logo-img" src="assets/img/zhuozuo-original.png" alt="拙作">

  <!-- 动画叠加层 -->
  <div class="anim-overlay">
    <!-- 山峰河流 -->
    <div class="river-flow">
      <svg viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M 8 16 Q 32 9, 56 15 T 92 13"
              stroke="rgba(255,255,255,0.82)"
              stroke-width="3"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="80"
              stroke-dashoffset="0">
          <animate attributeName="stroke-dashoffset"
                   from="80" to="0"
                   dur="4.8s"
                   repeatCount="indefinite"/>
          <animate attributeName="opacity"
                   values="0;0.75;0.65;0"
                   dur="4.8s"
                   repeatCount="indefinite"/>
        </path>
        <path d="M 12 22 Q 36 15, 60 21 T 96 19"
              stroke="rgba(255,255,255,0.64)"
              stroke-width="2.2"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="80"
              stroke-dashoffset="0">
          <animate attributeName="stroke-dashoffset"
                   from="80" to="0"
                   dur="4.8s"
                   begin="0.5s"
                   repeatCount="indefinite"/>
          <animate attributeName="opacity"
                   values="0;0.65;0.55;0"
                   dur="4.8s"
                   begin="0.5s"
                   repeatCount="indefinite"/>
        </path>
      </svg>
    </div>

    <!-- 小人裙摆光晕 -->
    <div class="person-glow"></div>
  </div>
</div>

<div class="title">探索设计与技术的边界</div>

<div class="hint">轻触 · 进入</div>

<script>
let clicked = false;

document.body.addEventListener('click', () => {
  if (clicked) return;
  clicked = true;
  document.body.classList.add('clicked');

  // 标题浮现后，整页缓缓溶进背景，再交接给 main.html（淡入），两屏无缝衔接
  setTimeout(() => {
    document.body.classList.add('leaving');
  }, 2050);

  setTimeout(() => {
    window.location.href = 'main.html';
  }, 2950);
});
</script>
